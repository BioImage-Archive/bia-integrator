accession_id: "EMPIAR-11747"
paper_doi: "https://doi.org/10.1016/j.cell.2024.09.013"

specimen_defaults:
  biosample_title: "Wild-type Thalassiosira pseudonana"
  specimen_imaging_preparation_protocol_titles:
    - "Cell culture and sedimentation"
    - "Plunge freezing"
    - "Cryo-FIB milling"

specimens:
  pattern_alias_mappings:
    "(\\d{2})":
      - "tomo_(\\d{2})"
      - "Position_(\\d{2})"

biosamples:
  - title: "Wild-type Thalassiosira pseudonana"
    organism_classification:
      - common_name: "T. pseudonana"
        scientific_name: "Thalassiosira pseudonana"
        ncbi_id: "NCBI:txid35128"
    biological_entity_description: "Wild-type Thalassiosira pseudonana cells grown in F/2 artificial seawater."
    growth_protocol_title: "T. pseudonana cell culture"

specimen_imaging_preparation_protocols:
  - title: "Cell culture and sedimentation"
    protocol_description: "T. pseudonana cells were grown under normal atmosphere in F/2 artificial seawater at 18°C and 40 μmol photons m−2 s−1 light without shaking. Cells were sedimented at 800 × g for 5 min prior to vitrification."
  - title: "Plunge freezing"
    protocol_description: "4 μL of cell suspension was applied on 200-mesh R2/1 carbon-film covered copper grids (Quantifoil Micro Tools) and plunge frozen using a Vitrobot Mark IV (Thermo Fisher Scientific)."
  - title: "Cryo-FIB milling"
    protocol_description: "EM grids were clipped into Autogrid supports (Thermo Fisher Scientific) and loaded into Aquilos 1 or 2 FIB-SEM instruments (Thermo Fisher Scientific), where they were thinned with a Gallium ion beam. The resulting EM grids with thin lamellae were transferred to a transmission electron microscope for tomographic imaging."

image_acquisition_protocols:
  - title: "Cryo-electron tomography"
    protocol_description: "Tilt-series were obtained using SerialEM 3.8 software using a dose-symmetric tilt scheme with 2° steps totalling 60 tilts per series. Each image was recorded in counting mode with ten frames per second. Target defocus ranged from −2 to −5 μm. Total dose per tilt series was approximately 120 e⁻/Å². Image pixel size was 2.143 Å."
    imaging_instrument_description: "300 kV Titan Krios G3i (Thermo Fisher Scientific) equipped with a BioQuantum post-column energy filter (Gatan) and a K3 direct electron detector (Gatan)."
    fbbi_id:
      - "obo:FBbi_00000256"
    imaging_method_name:
      - "Cryo-electron tomography"

protocols:
  - title: "T. pseudonana cell culture"
    protocol_description: "T. pseudonana cells were grown under normal atmosphere in F/2 artificial seawater at 18°C and 40 μmol photons m−2 s−1 light without shaking."
  - title: "Tilt series preprocessing"
    protocol_description: "TOMOMAN Matlab scripts (version 0.6.9) were used to preprocess the tomographic tilt series data. Raw frames were aligned using MotionCor2 (version 1.5.0), then tilt-series were dose-weighted followed by manual removal of bad tilts. The resulting tilt-series were binned 4 times to a pixel size of 8.57 Å and aligned in IMOD (version 4.11) using patch tracking."
  - title: "Tomogram reconstruction"
    protocol_description: "Tomograms were reconstructed from aligned tilt-series by weighted back projection in IMOD (version 4.11)."
  - title: "Tomogram denoising"
    protocol_description: "Cryo-CARE (version 0.2.1) was applied on reconstructed tomogram pairs from odd and even raw frames to enhance contrast and remove noise."

datasets:
  - name: "Raw frames"
    data_directories:
      - "data/raw_frames"
    
    file_globs:
      frames:
        - "**/*.tif"
    
    image_acquisition_protocol_title:
      dataset:
        - "Cryo-electron tomography"

  - name: "Tilt series assembled from motion-corrected and averaged frames"
    data_directories:
      - "data/raw_stacks"
    
    file_globs:
      tilt_series:
        - "**/*.st"
    
    protocol_titles:
      tilt_series:
        - "Tilt series preprocessing"
  
  - name: "IMOD bin4 tomograms"
    data_directories:
      - "data/bin4_imod"
    
    file_globs:
      tomogram:
        - "**/*.mrc"
    
    protocol_titles:
      tomogram:
        - "Tomogram reconstruction"
    
  - name: "Denoised bin4 tomograms"
    data_directories:
      - "data/bin4_cryocare"
    
    file_globs:
      denoised_tomogram:
        - "**/*.rec"
    
    protocol_titles:
      denoised_tomogram:
        - "Tomogram denoising"