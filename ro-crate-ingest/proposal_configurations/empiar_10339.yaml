accession_id: "EMPIAR-10339"
paper_doi: "https://doi.org/10.1242/jcs.263654"

specimens:
  patterns:
    - "(G[01]).*?/(\\d{8}_\\d{2})"

biosamples:
  - title: "S. pombe G0 quiescent cells"
    organism_classification:
      - common_name: "Fission yeast"
        scientific_name: "Schizosaccharomyces pombe"
        ncbi_id: "NCBI:txid4896"
    biological_entity_description: "Wild-type 972 h- S. pombe cells (strain MBY99) in G0 quiescence, induced by nitrogen starvation."
    growth_protocol_title: "S. pombe G0 quiescence induction"
  - title: "S. pombe G1-arrested cells"
    organism_classification:
      - common_name: "Fission yeast"
        scientific_name: "Schizosaccharomyces pombe"
        ncbi_id: "NCBI:txid4896"
    biological_entity_description: "S. pombe cdc10-129 thermosensitive mutant cells (strain MBY165; leu1-32) arrested in G1 phase by temperature shift to 36°C."
    growth_protocol_title: "S. pombe G1 arrest by temperature shift"

protocols:
  - title: "S. pombe G0 quiescence induction"
    protocol_description: "Proliferating wild-type 972 h- S. pombe cells (strain MBY99) were grown in Edinburgh minimal medium (EMM) at 30°C with shaking at 200–250 rpm to OD600=0.2. Cells were washed twice in EMM without nitrogen (EMM−N) by pelleting 5.0 OD600 units at 3220 g for 3 min, resuspending in 500 µl EMM−N, centrifuging at 5000 g for 1 min, and repeating. Cells were then incubated for 24 h in EMM−N at 30°C to induce G0 quiescence."
  - title: "S. pombe G1 arrest by temperature shift"
    protocol_description: "S. pombe cdc10-129 cells (strain MBY165; leu1-32) were grown in yeast extract with supplements (YES; 5 g/l yeast extract, 30 g/l glucose, 75 mg/l each of histidine, leucine, adenine, and uracil) at 30°C with shaking at 200–250 rpm. When OD600 reached 0.2, cultures were transferred to 36°C and incubated for 4 h, arresting the majority of cells in G1 phase."
  - title: "Tomogram reconstruction"
    protocol_description: "Movies were aligned with the IMOD software package and alignframes. Tilt series were automatically coarse-aligned using the IMOD program eTomo in batch-tomography mode, with final alignment by patch tracking in eTomo. Contrast-transfer function compensation was applied to defocus phase-contrast images. Tilt series were binned four times and low-pass filtered (µ=0.35, σ=0.05) at 6.8 Å pixel size. Cryotomograms were reconstructed by weighted back projection using default eTomo parameters and trimmed in 3D."

specimen_imaging_preparation_protocols:
  - title: "Plunge freezing of S. pombe cells"
    protocol_description: "Cells were centrifuged at 5000 g and resuspended to OD600=2.5 (G1-arrested cells) or OD600=4.0 (G0 cells). 4 µl of cell suspension was pipetted onto the carbon side of an EM grid and manually blotted from the reverse side with filter paper (Whatman Grade 1) for 1–2 s using a Vitrobot Mark IV (Thermo Fisher Scientific) operated at the respective arrest temperature (37°C for G1-arrested cells, 30°C for G0 cells) at 100% relative humidity, then plunged into 37% ethane/63% propane cooled by liquid nitrogen."
  - title: "Cryo-FIB milling of S. pombe lamellae"
    protocol_description: "Plunge-frozen grids were inserted into a FEI Helios dual-beam electron microscope at −158°C using a PolarPrep 2000 Cryo Transfer System (Quorum Technologies). Grids were coated with organometallic platinum via gas injection system (warmed to 33.85°C, flow opened for 15 or 20 s, cold deposition method). Cells were located on the grid and milled to generate a 100–150 nm thick, 15 µm wide lamella near the cell centre, using sequential beam currents of 2.8 nA (rough milling), 0.46 nA (intermediate milling), and 48 pA (final polishing)."

image_acquisition_protocols:
  - title: "Cryo-electron tomography"
    protocol_description: "Tilt series were collected on a Titan Krios (Thermo Fisher Scientific) operating at 300 kV, equipped with a Volta phase plate, a K3 direct detection camera (AMETEK), and a Gatan imaging filter operated in zero-loss mode with a 20 eV slit width. Images were captured as super-resolution movie frames at 1.7 Å pixel size using SerialEM."  # CR: methods note both VPP and defocus phase-contrast imaging were used, but it is not clear from the imageset which tilt series are which; described generally
    imaging_instrument_description: "Titan Krios (Thermo Fisher Scientific) operating at 300 kV, equipped with a Volta phase plate (TFS), K3 direct detection camera (AMETEK), and Gatan imaging filter in zero-loss mode (20 eV slit width)."
    fbbi_id:
      - "obo:FBbi_00000256"
    imaging_method_name:
      - "Cryo-electron tomography"

datasets:
  - name: "Tilt series and tomograms of cryosections and cryolamellae of fission yeast cells: G0 quiescence, G1-arrested, proliferating, and TSA-treated nitrogen-starved"
    data_directories:
      - "data"
    
    file_globs:
      tilt_series:
        - "G*_tilt/*.mrc.bz2"
      tomogram:
        - "G*_tomo/*rec.bz2"
    
    image_acquisition_protocol_title:
      tilt_series:
        - "Cryo-electron tomography"
    
    protocol_titles:
      tomogram:
        - "Tomogram reconstruction"
    
    specimen_groups:
      - specimen_id_pattern: "^G0_"
        biosample_title: "S. pombe G0 quiescent cells"
        specimen_imaging_preparation_protocol_titles:
          - "Plunge freezing of S. pombe cells"
          - "Cryo-FIB milling of S. pombe lamellae"
      
      - specimen_id_pattern: "^G1_"
        biosample_title: "S. pombe G1-arrested cells"
        specimen_imaging_preparation_protocol_titles:
          - "Plunge freezing of S. pombe cells"
          - "Cryo-FIB milling of S. pombe lamellae"