  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Cryo-ET data were collected at 300 kV on a Thermo Fisher Scientific Titan Krios G4 equipped with a cold field emission gun (E-CFEG), a Falcon 4 direct electron detector operated in counting mode, and a Selectris X imaging filter. Montaged grid overviews were acquired at 205 nm pixel size and individual lamella montages at 3 nm pixel size. Tilt series were acquired using SerialEM (version 4.0.20) in low-dose mode as 4K × 4K movies of 10 frames each, with on-the-fly motion correction in SerialEM. The acquisition magnification of 53,000x corresponded to a nominal pixel size of 2.414 Å. Tilt series were collected using a dose-symmetric scheme starting from the lamella pretilt of ±8°, with 2° increments grouped by 2, yielding 61 projections per tilt series, a total dose of ~135 e⁻/Å², and a dose rate of ~4–6 e⁻/px/s. The energy slit width was set to 10 eV and nominal defocus was varied between -2.0 and -4.0 μm."
      imaging_instrument_description: "Thermo Fisher Scientific Titan Krios G4 cryo-TEM at 300 kV, equipped with a cold field emission gun (E-CFEG), Thermo Fisher Scientific Falcon 4 direct electron detector (counting mode), and Thermo Fisher Scientific Selectris X imaging filter."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "MDM isolation and culture"
      protocol_description: "Monocyte-derived macrophages (MDMs) were obtained from human peripheral blood mononuclear cells (PBMCs) isolated from buffy coats of healthy donors obtained from the Heidelberg University Hospital Blood Bank. MDMs were cultivated in RPMI 1640 medium supplemented with 10% heat-inactivated FBS, 100 U/ml penicillin, 100 mg/ml streptomycin, and 5% human AB serum at 37°C in a humidified incubator with 5% CO2. For seeding, MDMs were detached using Accutase according to the manufacturer's instructions."
    - title: "Tomogram reconstruction"
      protocol_description: "Motion-corrected tilt series were corrected for dose exposure using a MATLAB implementation adapted for tomographic tilt series. Projection images of poor quality were removed after visual inspection. Dose-filtered tilt series were aligned using patch-tracking in AreTomo (version 1.33) and reconstructed as back-projected tomograms with SIRT-like filtering (15 iterations) at a binned pixel size of 9.656 Å (bin4) using IMOD (version 4.11.5). Tomograms containing nuclear pore complexes and/or HIV capsids were selected by visual inspection. The same tilt series were additionally reconstructed with 3D-CTF correction using novaCTF with phase-flip correction, astigmatism correction, and a 30 nm slab. Tomograms were binned 2x, 4x, and 8x using Fourier3D."
