  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Tilt-series data were collected on a Titan Krios G3i microscope operating at 300 kV, equipped with a Gatan energy filter and K3 camera, using SerialEM (version 3.9). Tilt series were acquired using a dose-symmetric scheme with a tilt range of −60° to +60° at 3° increments. Data collection settings: magnification ×64,000; pixel size 1.329 Å on sample; energy filter slit width 20 eV; K3 camera in non-correlated double sampling counting mode; target dose rate 20 e⁻ per pixel per second; 10 frames per tilt image; constant exposure time per tilt; total dose 137 e⁻/Å². Target defocus ranged from 1 to 3.25 μm across tilt series. In total, 139 tilt series were used for data processing and analysis."
      imaging_instrument_description: "Titan Krios G3i cryo-TEM at 300 kV, equipped with a Gatan energy filter and K3 direct electron detector."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "M. pneumoniae cultivation"
      protocol_description: "Wild-type M. pneumoniae strain M129 (ATCC 29342) were cultivated in cell culture flasks with modified Hayflick medium. For cryo-EM grid preparation, 200 mesh gold grids with holey Quantifoil support (R2/1) were glow discharged for 45 s and sterilised under UV irradiation in a laminar flow hood for 30 min before immersing in culture medium. After inoculation, M. pneumoniae cells were grown at 37°C for less than 20 hours to ensure the fast-growing phase."
