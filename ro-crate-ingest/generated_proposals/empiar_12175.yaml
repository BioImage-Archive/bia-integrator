  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Tilt series were collected using Leginon on a TFS Titan Krios operating at 300 kV in counting mode on a Gatan K2 BioQuantum with a 20 eV energy filter slit. Data were acquired at a pixel size of 3.298 Å with a nominal defocus of −6 µm. Tilt series were collected bidirectionally from 0° to ±50° in 2° increments using a dose-symmetric scheme, with per-image dose of 1.13–1.74 e−/Å2 (scaled by cosine of tilt angle, yielding 15–23 frames per image) and a total dose of 68 e−/Å2 per tilt series."
      imaging_instrument_description: "TFS Titan Krios cryo-TEM at 300 kV, equipped with a Gatan K2 BioQuantum direct electron detector and energy filter (20 eV slit width), at NYSBC."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "Microsporidian spore propagation and purification"
      protocol_description: "E. hellem spores were propagated in Vero cells (ATCC CCL-81) maintained in EMEM with 10% heat-inactivated FBS at 37°C with 5% CO2. At approximately 90% confluence, medium was replaced with EMEM supplemented with 3% FBS and parasites were added to a 25 cm2 flask. Medium was changed every 2 days. After 14 days post-infection, cells were detached by scraping, centrifuged at 1300 × g for 10 min, and resuspended in 5 mL distilled water. Spores were mechanically disrupted with a G27 needle, purified by centrifugation at 1800 × g for 30 min at 25°C through 100% Percoll, washed three times with PBS, and stored at 4°C. Concentration was measured by hemocytometer."
    - title: "Tilt series pre-processing and alignment"
      protocol_description: "Tilt images were pre-processed using MotionCor2 and protomo. Tilt series alignment was performed using either IMOD or AreTomo."
    - title: "Tomogram reconstruction"
      protocol_description: "Tomograms were reconstructed using either IMOD or AreTomo."
