  SpecimenImagingPreparationProtocol:
    - title: "Waffle grid preparation"
      protocol_description: "Quantifoil carbon 200 mesh grids were sputter-coated with approximately 25 nm carbon on the non-grid-bar side. Brass planchette hats were polished and coated with 1-hexadecene, and grids were plasma cleaned (80% O2, 20% H2, 30 s). A concentrated spore suspension was applied to the bottom waffle assembly on the grid-bar side, optionally with 2-methylpentane applied before closing, and the assembly was high-pressure frozen in a Wohlwend HPF Compact 01. The waffled grid was recovered by disassembling the planchette hats and clipped for transfer."
    - title: "Cryo-FIB milling of waffled lamellae"
      protocol_description: "Waffled grids were transferred to a Quorum PP3000T prep chamber on a FEI Helios NanoLab 650 cryo-FIB/SEM at NYSBC. Conductive platinum was sputter-coated onto the grid (60 s), and platinum GIS was deposited (4–7 s). Grid bar lines were milled to aid orientation. Pairs of trenches were milled at 45–90° from the grid plane at 0.79–9.3 nA to isolate slabs approximately 30 µm apart. With the grid in a tilted holder, lamellae were thinned sequentially: coarse milling at 0.43–2.5 nA to ~3 µm; intermediate milling at 0.23 nA to ~1.5 µm with ±1° stage tilt; fine milling at 80 pA CCS to ~0.5 µm with ±0.5° tilt; and final polishing at 80 pA CCS to 200 nm or less. A notch was milled into one side of each slab to reduce stress. Grids were sputter-coated with platinum after milling."
