accession_id: "EMPIAR-10989"
paper_doi: "https://doi.org/10.1038/s41563-020-00825-z"
rembis:
  BioSample:
    - title: "RPE1 cells on fibronectin micropatterned grids"
      organism_classification:
        - common_name: "Human"
          scientific_name: "Homo sapiens"
          ncbi_id: "NCBI:txid9606"
      biological_entity_description: "RPE1 cells seeded on fibronectin micropatterned gold mesh grids with perforated SiO2 film (Quantifoil R1/4), at a density of 8 × 10³ cells per cm². Cells were allowed to adhere for 20–35 min and then incubated at 37 °C with 5% CO₂ for 4–7 h prior to vitrification."
      growth_protocol_title: "RPE1 cell seeding on micropatterned grids"
  SpecimenImagingPreparationProtocol:
    - title: "Vitrification of micropatterned cells"
      protocol_description: "Grids were blotted from the back side of the grid support film and immediately plunged into liquid ethane at liquid nitrogen temperature using a Leica EM GP plunger (Leica Microsystems)."
    - title: "Cryo-FIB milling"
      protocol_description: "Wedge preparation by cryo-focused ion beam milling was performed on an Aquilos dual-beam microscope (ThermoFisher Scientific). Appropriate positions for FIB preparations were identified and recorded in MAPS 3.3 software (ThermoFisher Scientific). The eucentric height was refined per position. Wedges were prepared using a gallium ion beam at 30 kV and stage tilt angles of 12–13°, conducted stepwise starting 5 µm away from the area of interest at 1 nA, gradually reduced to 50 pA for the final cleaning steps. Grids were sputter coated after wedge preparation with platinum (10 mA, 3 s)."
  Specimen:
    - title: "Specimen_00004"
      biosample_title: "RPE1 cells on fibronectin micropatterned grids"
      specimen_imaging_preparation_protocol_title:
        - "Vitrification of micropatterned cells"
        - "Cryo-FIB milling"
    - title: "Specimen_00011"
      biosample_title: "RPE1 cells on fibronectin micropatterned grids"
      specimen_imaging_preparation_protocol_title:
        - "Vitrification of micropatterned cells"
        - "Cryo-FIB milling"
    - title: "Specimen_00012"
      biosample_title: "RPE1 cells on fibronectin micropatterned grids"
      specimen_imaging_preparation_protocol_title:
        - "Vitrification of micropatterned cells"
        - "Cryo-FIB milling"
  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Cryo-electron microscopy data were collected on a Titan Krios microscope operated at 300 kV (ThermoFisher Scientific) equipped with a field-emission gun, a Quantum post-column energy filter (Gatan), a K2 Summit direct detector camera (Gatan), and a Volta phase plate. Data were recorded in dose-fractionation mode using SerialEM v3.7.2. Prior to tilt-series acquisition, montages of the wedges were acquired at ~2 nm/pixel. Tilt series were collected using a dose-symmetric scheme in nano-probe mode at EFTEM magnification 42,000×, corresponding to a pixel size of 3.37 Å at the specimen level, with a defocus range of 3–4 µm, a tilt increment of 2°, and a constant dose of 2 e⁻/Å² per tilt."
      imaging_instrument_description: "Titan Krios cryo-TEM at 300 kV, equipped with a field-emission gun, Quantum post-column energy filter (Gatan, zero-loss mode), K2 Summit direct detector camera (Gatan), and a Volta phase plate."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "RPE1 cell seeding on micropatterned grids"
      protocol_description: "Gold mesh grids overlaid with a perforated (R1/4) SiO2 film (Quantifoil Micro Tools) were micropatterned using a one-step passivation and illumination approach based on a digital micromirror device combined with a photo-activator (Leonardo v4.12, Alveole Lab). RPE1 cells were seeded on fibronectin micropatterned grids at a density of 8 × 10³ cells per cm² for 20–35 min. Grids were then transferred to a cell-free dish and incubated at 37 °C with 5% CO₂ to allow cell adhesion. Cells were vitrified 4–7 h post-transfer."
    - title: "Tomogram reconstruction"
      protocol_description: "Tomograms were reconstructed using the IMOD software package v4.9.0. Reconstructed tomograms were filtered with an anisotropic nonlinear diffusion denoising algorithm (K value of 1, 10 iterations)."
datasets:
