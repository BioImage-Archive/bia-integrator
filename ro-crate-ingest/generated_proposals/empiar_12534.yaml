  ImageAcquisitionProtocol:
    - title: "Cryo-ET acquisition on Titan Krios"
      protocol_description: "FIB-milled lamellae were imaged on a Titan Krios (Thermo Fisher Scientific) operated at 300 keV, equipped with a K3 direct electron camera and BioQuantum energy filter (Gatan). Target selection and tilt series acquisition were performed using PACE-tomo 1.5, enabling parallel collection of multiple tilt series per lamella via beam shift. Data were acquired at either 53,000× magnification (pixel size 1.6626 Å) or 33,000× magnification (pixel size 2.638 Å). Nominal defocus ranged from −4 to −6 µm in 1 µm steps. Tilt series were collected in a dose-symmetric scheme with a 3° tilt increment over a range of −60° to +60°, centred on −11° pretilt with +11° starttilt. Each tilt was collected with dose fractionation into 10–11 frames at 0.28–0.33 e/Å² per frame, giving approximately 3 e/Å² per tilt and a total accumulated dose of approximately 120 e/Å² per tilt series."
      imaging_instrument_description: "Thermo Fisher Scientific Titan Krios cryo-TEM at 300 keV, equipped with a K3 direct electron camera and Gatan BioQuantum energy filter."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "S. cerevisiae culture and vitrification"
      protocol_description: "Yeast cells were recovered by streaking on YPD agar plates and incubated at 30°C for approximately 2 days. A single colony was inoculated into YPD or YPG medium and grown overnight at 30°C. The overnight culture was diluted to OD600 0.2 and grown to OD600 0.8 at 30°C. For cryo-ET sample preparation, the culture was diluted fourfold to OD600 0.2 in medium supplemented with cycloheximide (CHX) or vehicle. 4 µl of sample was applied to glow-discharged R1/4 Carbon 200-mesh gold EM grids (Quantifoil) and plunge-frozen in a liquid ethane/propane mixture using a Vitrobot Mark 4 (Thermo Fisher Scientific) at 30°C with 100% humidity. Blotting was performed manually from the back side of grids."
    - title: "Tomogram reconstruction"
      protocol_description: "Tilt series stacks were generated in Warp after adjusting the starting tilt to 0° in the mdoc files. Motion correction and CTF estimation were performed in Warp. Tilt series alignment was performed using patch-tracking in batch mode and further optimised manually in eTomo (IMOD). The resulting alignment files were imported into Warp, and tomostar files were dose-adjusted. Tomograms were reconstructed with sixfold binning in Warp, resulting in a voxel size of 9.98 Å and dimensions of 682 × 960 × 334 pixels."
datasets:
  - title: "Raw unaligned frame and metadata for each tilt in tilt-series acquired on CHX-treated S. cerevisiae cryo-FIB lamellae"
