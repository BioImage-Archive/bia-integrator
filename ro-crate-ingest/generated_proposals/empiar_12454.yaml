accession_id: "EMPIAR-12454"
paper_doi: "https://doi.org/10.1016/j.cell.2024.12.008"
rembis:
  BioSample:
    - title: "Human monocyte-derived macrophages (MDM)"
      organism_classification:
        - common_name: "Human"
          scientific_name: "Homo sapiens"
          ncbi_id: "NCBI:txid9606"
      biological_entity_description: "Monocyte-derived macrophages (MDMs) obtained from human peripheral blood mononuclear cells isolated from buffy coats of healthy donors."
      growth_protocol_title: "MDM isolation and culture"
  SpecimenImagingPreparationProtocol:
    - title: "MDM infection and grid seeding"
      protocol_description: "MDMs were seeded at 4 × 10^4 cells per glow-discharged, UV-sterilized 200-mesh gold EM grid coated with R 2/2 holey carbon film (Quantifoil), placed in glass-bottomed microwell MatTek dishes, and cultured for 24 hours at 37°C. Cells were then incubated for 48 hours with IN.mScarlet-labelled non-infectious HIV-1 particles (NNHIV) pseudotyped with R5-tropic Env (isolate 4059) at 60 μU RT/cell."
    - title: "Vitrification and cryo-FIB milling"
      protocol_description: "Infected MDMs on EM grids were vitrified by plunge freezing using a Leica EM GP2 plunger with the blotting chamber maintained at 37°C and 90% humidity. Prior to freezing, 3 μl of culture medium was applied to each grid, which was then blotted from the back for 3 s using Whatman Grade 1 filter paper before plunging into liquid ethane at -183°C. Cryo-FIB milling was performed on a Thermo Fisher Scientific Aquilos 2 dual-beam microscope. Samples were coated with an organometallic platinum layer by gas injection for 10 s, then sputter-coated with platinum at 1 kV and 10 mA for 10 s. Stepwise milling was carried out using AutoTEM (version 2.4.2) with an ion beam at 30 kV, reducing the current from 1000 pA to 50 pA. Final polishing was performed at 30 pA to a target lamella thickness of 200 nm."
