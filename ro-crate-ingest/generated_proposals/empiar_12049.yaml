  SpecimenImagingPreparationProtocol:
    - title: "Embryo dissociation and plunge freezing"
      protocol_description: "Embryos in modified L-15 medium were treated with 4 mg/ml chitinase for 15 min with rocking, followed by two rounds of centrifugation at 300 RCF for 3 min at 22°C. After the final centrifugation, cells were separated by aspiration through a 200 μl pipette tip for 10 min. Accutase solution was added (25 μl) and incubated at room temperature for 10 min with gentle shaking, followed by a further 10 min of pipetting. Cells were filtered sequentially through 20 μm and 10 μm cell strainers to remove large clumps, and checked by light microscopy to confirm clusters were smaller than 20 μm. Plunge freezing was performed within one hour of dissociation. Quantifoil Holey SiO2 R 1/4 Au 200 mesh grids were glow discharged on both sides for 45 s at 0.37 mBar and 15 mA. Using a Leica EM GP2 at 22°C and 70% humidity, 4 μl of cell suspension was applied to the front of the grid and 2 μl of supplemented L-15 to the back; grids were blotted from the back for 3 s and plunged into liquid ethane at -185°C."
    - title: "Cryo-fluorescence microscopy"
      protocol_description: "Grids were clipped into Autogrid cartridges modified for shallow-angle FIB milling and transferred to a Leica cryo-confocal microscope based on the Leica TCS SP8, equipped with a cryo-stage. Grid overviews were acquired in epifluorescence mode with a 50x NA 0.9 air objective and montaged using the Mosaic stitching module in Leica Application Suite X 3.5.5 to generate a map for region-of-interest identification. Mitotic cells were selected for higher-detail confocal imaging (1056 × 1056 pixels, 182.65 × 182.65 μm; 4x line averaging; 200 Hz mirror speed; pinhole 91.95 μm; 55 × 0.37 μm z-steps over 20.11 μm). The 488 nm and 552 nm lasers were set to 50% power, with detection at 492–540 nm and 596–719 nm respectively. Interphase cells were targeted for FIB milling without detailed cryo-FM imaging."
    - title: "Cryo-FIB milling"
      protocol_description: "Cryo-FIB milling was carried out on a Thermo Fisher Scientific Aquilos 1 dual-beam microscope. Prior to milling, scanning electron microscopy overviews were manually overlaid with the cryo-fluorescence microscopy montage and confocal Z-projections (generated in Fiji 2.9.0) to define grid squares and lamella positions for cells of interest identified by cryo-FM. Grids were coated with organometallic platinum via the Gas Injection System for 10 s, then sputter-coated with metallic platinum at 10 Pa, 1 kV, and 10 mA for 20 s. Milling was carried out at a 20° stage tilt using a shuttle with a 45° pretilt at 30 kV. 300 nm micro-expansion joints were milled on both sides of each target lamella to reduce stress. Sequential milling was performed at 1 nA, 500 pA, and 300 pA at distances of 5 μm, 3 μm, and 1 μm from the lamella target, respectively, followed by fine milling at 100 pA. Milling was performed either fully manually or with automated rough milling using SerialFIB. Completed grids were sputter-coated for 3 s at 10 Pa, 1 kV, and 10 mA."
