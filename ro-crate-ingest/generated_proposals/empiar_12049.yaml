  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Tilt-series data were collected on a Thermo Fisher Scientific Titan Krios operating at 300 kV, equipped with a field-emission gun, a Gatan Quantum post-column energy filter in zero-loss mode, a Gatan K2 Summit direct electron detector, and a Volta phase plate preconditioned for 6 min prior to acquisition. Grid maps were collected at 233 nm/pixel and lamella maps at 2.2 nm/pixel, and overlaid with the cryo-fluorescence microscopy montage and projected confocal stacks to guide tilt-series targeting. Dose-fractionated tilt series were acquired using SerialEM with a tilt range of -60° to +60° at 2° increments in a dose-symmetric scheme, with the sample pre-tilted to compensate for the FIB milling angle. A pixel size of 3.37 Å/pixel, defocus range of 2.5–4.5 μm, and total electron dose of 120 e⁻/Å² were applied. In total, 12 tomograms of centrosomes were analysed."
      imaging_instrument_description: "Thermo Fisher Scientific Titan Krios cryo-TEM at 300 kV, equipped with a field-emission gun, Gatan Quantum post-column energy filter (zero-loss mode), Gatan K2 Summit direct electron detector, and Volta phase plate."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "C. elegans maintenance and embryo collection"
      protocol_description: "C. elegans worms expressing GFP::SPD-5 and H2B::mCherry were maintained at 22°C on NGM plates seeded with OP50 bacteria until reaching the gravid adult stage. For each preparation, at least four 100 mm petri dishes were grown until bacteria was almost fully consumed. Plates were washed with M9 media supplemented with 0.1% PEG 3350 and passed through a 40 μm cell strainer to remove bacteria, eggs, and larvae. Gravid mothers retained on the strainer were washed into 1.5 ml Eppendorf tubes and washed three times by centrifugation at 600 RCF for 6 min at 22°C. Embryos were enriched by bleaching: worms were incubated with bleaching solution (750 μl H2O, 600 μl 5 M NaOH, 450 μl 5% bleach) at 1400 RPM on a thermomixer at 22°C for 13 min, centrifuged at 600 RCF for 6 min, and resuspended in M9 with 0.1% PEG. The M9 medium was replaced with L-15 medium without phenol red, supplemented with 50 U/ml penicillin-streptomycin, 10% FBS, and sucrose to 340 mOsm, by three rounds of centrifugation at 600 RCF for 6 min at 22°C."
    - title: "Tomogram reconstruction"
      protocol_description: "Motion correction and CTF estimation were carried out in Warp 1.0.9 from raw movie frames. Tilt-series alignment was performed using patch tracking in eTomo within the IMOD package. Final tomogram reconstruction was carried out in Warp at a voxel size of 13.4 Å/pixel (4x binning). For centrosome matrix segmentation, tomograms were denoised using cryoCARE 0.2.1 and deconvolved in Warp. A lamella mask generated using TOM toolbox in MATLAB was applied. For tomograms with strong intensity gradients due to curtaining, filtering with kernel size 10 was applied to the denoised tomograms using TOM toolbox, and the filtered tomogram was subtracted as a background correction."
