      biological_entity_description: "Synaptosomes isolated from the cerebral cortex and hippocampi of adult male or female Wistar rats, prepared by Percoll gradient centrifugation."
      growth_protocol_title: "Wistar rat husbandry"
  SpecimenImagingPreparationProtocol:
    - title: "Synaptosome preparation"
      protocol_description: "Cerebral cortex and hippocampi were dissected into sucrose buffer (SEH: 0.32 M sucrose, 1 mM EDTA, 10 mM HEPES) on ice and homogenised with a Potter-Elvehjem grinder (four strokes at the bottom, six from top to bottom at 800 rpm). The homogenate was centrifuged at 1,000 g for 10 min at 4°C to remove meninges and blood vessels. The supernatant was layered onto a discontinuous isosmotic Percoll gradient (5%, 10%, and 23% in 0.32 M sucrose, 1 mM EDTA) and centrifuged at 47,000 g for 12 min at 4°C (SW 40 Ti rotor). The 10–23% interface, enriched in functional synaptosomes, was collected, diluted 1:10 in HEPES-buffered medium (HBM: 140 mM NaCl, 5 mM KCl, 5 mM NaHCO3, 1.2 mM Na2HPO4, 1 mM MgCl2, 10 mM glucose, 20 mM HEPES), and pelleted at 14,540 g for 20 min at 4°C (rotor 45 Ti). The pellet was resuspended in HBM."
    - title: "Plunge freezing"
      protocol_description: "All steps from incubation to plunge freezing were performed at room temperature (23–25°C). Synaptosomes were incubated with calcein blue AM for 30 min prior to freezing to label functional esterase-containing compartments. 1.3 mM CaCl2 and 10 nm gold fiducials were added to the synaptosomal suspension. For control (unstimulated) samples, the suspension was applied directly to 200-mesh lacey finder carbon film grids, blotted from the filter paper, and plunge frozen in liquid ethane using a home-built computer-controlled plunge freezer."
    - title: "Spray mixing and stimulation"
      protocol_description: "For stimulated samples, synaptosomes on the grid were spray mixed on the fly during plunge freezing. The sprayed solution contained 1 mM CaCl2, 52 mM KCl, and fluorescein (to trace spray droplets by cryo-FM) in HBM. The atomizer was driven by nitrogen gas at 2.5 bar, positioned 3–4 mm from the grid. The plunge freezer was accelerated to 0.75 m/s; the spray nozzle height was adjusted to achieve a minimum spray-to-freezing delay of approximately 7 ms, with a maximum delay of 35 ms achieved by varying the distance between nozzle and cryogen bath."
