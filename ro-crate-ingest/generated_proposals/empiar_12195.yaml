  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Grids were mounted in a cryo-holder and transferred to a Tecnai F20 operated at 200 kV in low-dose conditions, equipped with a field emission gun and a 2k × 2k CCD camera mounted after a GIF Tridiem post-column energy filter (zero-loss mode). The sample was maintained at approximately −180°C. Tilt series were acquired with SerialEM from −50° to +50° in 2° increments at an unbinned pixel size of 0.75 or 1.2 nm; defocus was set between −8 and −12 μm with a total dose of approximately 80–100 e⁻/Å². Some datasets were acquired on a Titan Krios equipped with a Gatan K2 direct electron detector (no energy filter), operated in super-resolution counting mode, acquiring 8–40 frames per tilt angle. Tilt series on the Krios were acquired with Latitude from −60° to +60° in 2° increments at 0.6 nm pixel size, with the same defocus and dose settings."
      imaging_instrument_description: "Tecnai F20 at 200 kV with CCD/GIF, or Titan Krios with K2."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "Wistar rat husbandry"
      protocol_description: "Adult male or female Wistar rats aged 6–8 weeks were obtained from the central animal facilities of the Department of Biomedical Research, University of Bern. Animals were slightly stunned by CO2 and quickly decapitated with a guillotine. All procedures were carried out in accordance with Swiss Veterinary Law guidelines."
    - title: "Tilt series processing"
      protocol_description: "For datasets acquired with a K2 direct electron detector, frames at each tilt angle were aligned and averaged using 2dx MC_Automator with MotionCor prior to image processing."
    - title: "Tomogram reconstruction"
      protocol_description: "3D reconstruction was performed in IMOD using automated fiducial tracking for alignment, followed by weighted back projection."
    - title: "Tomogram denoising"
      protocol_description: "Reconstructed tomograms were denoised by nonlinear anisotropic diffusion (NAD) filtering in IMOD."
