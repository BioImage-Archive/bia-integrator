accession_id: "EMPIAR-11747"
paper_doi: "https://doi.org/10.1016/j.cell.2024.09.013"
rembis:
  BioSample:
    - title: "Wild-type Thalassiosira pseudonana"
      organism_classification:
        - common_name: "T. pseudonana"
          scientific_name: "Thalassiosira pseudonana"
          ncbi_id: "NCBI:txid35128"
      biological_entity_description: "Wild-type Thalassiosira pseudonana cells grown in F/2 artificial seawater."
      growth_protocol_title: "T. pseudonana cell culture"
  SpecimenImagingPreparationProtocol:
    - title: "Cell culture and sedimentation"
      protocol_description: "T. pseudonana cells were grown under normal atmosphere in F/2 artificial seawater at 18°C and 40 μmol photons m−2 s−1 light without shaking. Cells were sedimented at 800 × g for 5 min prior to vitrification."
    - title: "Plunge freezing"
      protocol_description: "4 μL of cell suspension was applied on 200-mesh R2/1 carbon-film covered copper grids (Quantifoil Micro Tools) and plunge frozen using a Vitrobot Mark IV (Thermo Fisher Scientific)."
    - title: "Cryo-FIB milling"
      protocol_description: "EM grids were clipped into Autogrid supports (Thermo Fisher Scientific) and loaded into Aquilos 1 or 2 FIB-SEM instruments (Thermo Fisher Scientific), where they were thinned with a Gallium ion beam. The resulting EM grids with thin lamellae were transferred to a transmission electron microscope for tomographic imaging."
  Specimen:
    - title: "Specimen_10"
      biosample_title: "Wild-type Thalassiosira pseudonana"
      specimen_imaging_preparation_protocol_title:
        - "Cell culture and sedimentation"
        - "Plunge freezing"
        - "Cryo-FIB milling"
    - title: "Specimen_12"
