  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Tilt-series were obtained using SerialEM 3.8 software using a dose-symmetric tilt scheme with 2° steps totalling 60 tilts per series. Each image was recorded in counting mode with ten frames per second. Target defocus ranged from −2 to −5 μm. Total dose per tilt series was approximately 120 e⁻/Å². Image pixel size was 2.143 Å."
      imaging_instrument_description: "300 kV Titan Krios G3i (Thermo Fisher Scientific) equipped with a BioQuantum post-column energy filter (Gatan) and a K3 direct electron detector (Gatan)."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  Protocol:
    - title: "T. pseudonana cell culture"
      protocol_description: "T. pseudonana cells were grown under normal atmosphere in F/2 artificial seawater at 18°C and 40 μmol photons m−2 s−1 light without shaking."
    - title: "Tilt series preprocessing"
      protocol_description: "TOMOMAN Matlab scripts (version 0.6.9) were used to preprocess the tomographic tilt series data. Raw frames were aligned using MotionCor2 (version 1.5.0), then tilt-series were dose-weighted followed by manual removal of bad tilts. The resulting tilt-series were binned 4 times to a pixel size of 8.57 Å and aligned in IMOD (version 4.11) using patch tracking."
    - title: "Tomogram reconstruction"
      protocol_description: "Tomograms were reconstructed from aligned tilt-series by weighted back projection in IMOD (version 4.11)."
    - title: "Tomogram denoising"
      protocol_description: "Cryo-CARE (version 0.2.1) was applied on reconstructed tomogram pairs from odd and even raw frames to enhance contrast and remove noise."
