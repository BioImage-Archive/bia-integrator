rembis:
  BioSample:
    - title: "S. pombe G0 quiescent cells"
      organism_classification:
        - common_name: "Fission yeast"
          scientific_name: "Schizosaccharomyces pombe"
          ncbi_id: "NCBI:txid4896"
      biological_entity_description: "Wild-type 972 h- S. pombe cells (strain MBY99) in G0 quiescence, induced by nitrogen starvation."
      growth_protocol_title: "S. pombe G0 quiescence induction"
    - title: "S. pombe G1-arrested cells"
      organism_classification:
        - common_name: "Fission yeast"
          scientific_name: "Schizosaccharomyces pombe"
          ncbi_id: "NCBI:txid4896"
      biological_entity_description: "S. pombe cdc10-129 thermosensitive mutant cells (strain MBY165; leu1-32) arrested in G1 phase by temperature shift to 36°C."
      growth_protocol_title: "S. pombe G1 arrest by temperature shift"
  SpecimenImagingPreparationProtocol:
    - title: "Plunge freezing of S. pombe cells"
      protocol_description: "Cells were centrifuged at 5000 g and resuspended to OD600=2.5 (G1-arrested cells) or OD600=4.0 (G0 cells). 4 µl of cell suspension was pipetted onto the carbon side of an EM grid and manually blotted from the reverse side with filter paper (Whatman Grade 1) for 1–2 s using a Vitrobot Mark IV (Thermo Fisher Scientific) operated at the respective arrest temperature (37°C for G1-arrested cells, 30°C for G0 cells) at 100% relative humidity, then plunged into 37% ethane/63% propane cooled by liquid nitrogen."
    - title: "Cryo-FIB milling of S. pombe lamellae"
      protocol_description: "Plunge-frozen grids were inserted into a FEI Helios dual-beam electron microscope at −158°C using a PolarPrep 2000 Cryo Transfer System (Quorum Technologies). Grids were coated with organometallic platinum via gas injection system (warmed to 33.85°C, flow opened for 15 or 20 s, cold deposition method). Cells were located on the grid and milled to generate a 100–150 nm thick, 15 µm wide lamella near the cell centre, using sequential beam currents of 2.8 nA (rough milling), 0.46 nA (intermediate milling), and 48 pA (final polishing)."
