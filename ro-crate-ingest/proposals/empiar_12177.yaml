  ImageAcquisitionProtocol:
    - title: "Cryo-electron tomography"
      protocol_description: "Tilt series were collected in 3 sessions on 3 different Titan Krios microscopes equipped with K3 cameras (further details in publication - SI Appendix, Table S1). We aligned and reconstructed tomograms from 185 tilt series from E. intestinalis (datasets 1, 2 and 3 - and see publication's SI Appendix, Table S1). Data were collected at magnifications ranging from 26,000 to 42,000, corresponding to pixel sizes of 2.077 - 3.431 Å/pixel (publication SI Appendix, Table S1). The acquisitions were controlled either with Leginon or SerialEM with or without PACE-tomo (as noted in publication SI Appendix, Table S1), using 2 or 3 degrees step increments, a dose symmetric scheme and defocus ranges of -4 to -7 µm. At each tilt, movies with 10 to 23 frames were acquired, using dose per tilt ranging from 1.13 to 2.87 e-/Å2."
      imaging_instrument_description: "Titan Krios microscopes equipped with K3 cameras."
      fbbi_id:
        - "obo:FBbi_00000256"
      imaging_method_name:
        - "Cryo-electron tomography"
  
  AnnotationMethod:
    - title: ""
      protocol_description: ""
      method_type: [""]
  
  Protocol:
    - title: "Spore propagation and purification for dataset 3"
      protocol_description: "E. intestinalis microsporidian spores (ATCC: 50506) and Vero cells were maintained in Dulbecco's Modified Eagle Medium (DMEM) (Gibco 11995065), supplemented with 10% heat-inactivated fetal bovine serum (FBS) (VWR 89510-188) and 1X MEM-NEAA (Non-essential Amino Acids) (Gibco 11140050), and were grown at 37 degrees Celsius, 5% CO2. At 90% confluency the media was replaced with DMEM supplemented with 3% FBS and 1X MEM-NEAA and a single vial of spores was added. Vero cell maintenance and spore propagation were carried out in 75 cm2 tissue culture flasks and the media was refreshed every two days. Spores were harvested 14 days post-infection. Cells were detached from flasks using a cell scraper and the suspension was centrifuged at 1800 x g for 10 minutes at room temperature. Supernatant was discarded. Cells were resuspended in 1X DPBS (Gibco 14190144) and mechanically disrupted using a G27 needle to release any spores present inside cells. To purify spores, an equal volume of 100% percoll (Cytiva 17-0891-02) was added to the cell slurry in PBS and vortexed to homogenize the mixture. The solution was then centrifuged at 1,800 x g for 30 minutes at room temperature. The purified spore pellets were washed 3 times with 1X PBS and stored at 4 degrees Celsius until further use. Spores for dataset 3 were purified until this step and used for cryo-ET sample preparation."
    - title: "Dataset 3 pre-processing"
      protocol_description: "Dataset 3 tilt series were motion-corrected in WARP and tilts were aligned with AreTomo."
    - title: "Tomogram reconstruction"
      protocol_description: "4-times binned volumes reconstructed using AreTomo as examples."

