accession_id: EMPIAR-12176
paper_doi: https://doi.org/10.1073/pnas.2415233122
rembis:
  BioSample:
    - title: "Encephalitozoon intestinalis ATCC 50506"
      organism_classification:
        - common_name: "Encephalitozoon intestinalis"
          scientific_name: "Encephalitozoon intestinalis ATCC 50506"
          ncbi_id: "NCBI:txid876142"
      biological_entity_description: "Encephalitozoon intestinalis ATCC 50506 dormant spores."
      growth_protocol_title: "Spore propagation and purification"
  
  SpecimenImagingPreparationProtocol:
    - title: "Cryo-ET grid preparation"
      protocol_description: "The waffle method was used for grid preparation. Spore concentrations frozen per grid were as follows: 5.7 x 107 spores/µL for dataset 1, and 8 x 105 spores/µL for dataset 2. 5 µL of sample was applied to each waffle grid assembly, and the sample was frozen using Wholwend Compact 01 high pressure freezer, with a pressure of 2,100 bar. All waffled grids were carefully clipped prior to milling."
    - title: "Cryo-FIB milling and lamella preparation for cryo-ET"
      protocol_description: "Lamellae of 90 to 200 nm size for cryo-ET data collection were milled. We followed a published protocol for waffle grid preparation and milling. All parameters were kept the same as in the published protocol unless otherwise stated. Milling was performed on Thermo Fisher Scientific Aquilos 2 cryo-FIB/SEM instrument at NCITU. The accompanying protocols detail the steps of the milling protocol."
    - title: "Preparation and lamella site assignment"
      protocol_description: "For each grid that was milled, a new project was created in MAPS (Thermo Fisher Scientific) and an SEM grid overview was recorded. This was followed by platinum sputter coating for 15 seconds using a current of 30.0 mA and pressure 0.10 mbar. After the system was recovered from sputtering, a layer of organometallic platinum (also known as GIS platinum) was added. With our milling settings, we used 2 minutes of GIS for lamellae being milled with 200 nm thickness and 2 minutes 15 seconds for lamellae being milled with 150 nm thickness. Using MAPS software, ROIs and preliminary lamellae sites were defined on the grid. The grid was then moved from the mapping position to be orthogonal to the ion beam (IB) which was kept at 30 KV throughout our protocol. The microscope was operated using xT software (Thermofisher Scientific)."
    - title: "Lamellae pre-cuts"
      protocol_description: "With an ion beam current of 10 pA, we navigated to one of the milling sites marked in MAPS. An image was acquired and the contrast was adjusted such that the lamella site was clearly visible. The surface of each lamella site was inspected to ensure it was flat and free of contamination. To locate grid bars, small windows were milled using a current of 15 nA close to where they are expected to appear. Once located, we performed precuts away from the grid bars. Pre-cuts were performed using a pre-cut pattern on the xT software with a current of 15 nA. Contrast was adjusted during this process to ensure that sufficient sample was removed with the beam. Before moving to the next lamella site, the current was changed back to 10 pA. The same steps were repeated on all lamella sites."
    - title: "Lamellae pre-cleans"
      protocol_description: "After pre-cuts, we returned to the mapping position and acquired a new tileset with the same parameters as before. Old preliminary lamella sites were deleted and new sites were assigned on the grid overview using the pre-cut positions. The project was then opened in AutoTEM (Thermo Fisher Scientific) and a milling template (parameters as described in Klykov, Bobe et. al, 2022) was applied to all the lamellae sites. We then ran “preparation” for all lamella sites in guided mode and followed the prompts for eucentric tilt and a 20-degree milling angle. The lamellae were positioned to guide notch placement. This was followed by the pre-cleaning step which is performed in a stepwise manner. A milling angle of 45-degrees is set with milling current 7 nA, followed by 30 degrees with milling current 7 nA and finally 20 degrees with milling current 3 nA."
    - title: "Notch milling and final lamellae positioning"
      protocol_description: "The notch pattern was placed at the edge of the slab of the pre-defined lamella site. The dimensions of the notch pattern were as described in (Klykov, Bobe et. al, 2022). The notch was milled using a current of 0.3 nA. Final lamella placement was done in AutoTEM, where the lamella was placed 1 µm away from the notch. Automated milling and thinning of lamella sites was done in stepwise mode overnight using AutoTEM."
  
